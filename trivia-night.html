<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Pluckers Trivia</title>
<!-- Load the fonts so the host computer and the TVs render text identically
     (TVs usually don't have Impact, so we ship a web font instead). -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Oswald:wght@400;500;600;700&family=Fredoka:wght@500;600;700&family=Bebas+Neue&family=Archivo+Black&family=Poppins:wght@600;700;800&family=Montserrat:wght@700;800&family=Bungee&family=Righteous&family=Lobster&family=Pacifico&family=Playfair+Display:wght@700;800;900&family=Rye&family=Press+Start+2P&family=Monoton&family=Permanent+Marker&family=Anton+SC&family=Teko:wght@500;600;700&family=Russo+One&family=Black+Ops+One&family=Staatliches&family=Alfa+Slab+One&family=Titan+One&family=Luckiest+Guy&family=Bangers&family=Fjalla+One&family=Abril+Fatface&family=Lilita+One&family=Audiowide&family=Orbitron:wght@500;700;900&family=Chewy&family=Concert+One&family=Patua+One&family=Sigmar+One&family=Special+Elite&family=Caveat:wght@500;700&family=Creepster&display=swap" rel="stylesheet">
<style>
  :root {
    --red: #c8102e;
    --red-dark: #9a0a22;
    --red-deep: #6b0717;
    --yellow: #f4c430;
    --yellow-bright: #ffd84d;
    --blue: #1d3a8a;
    --blue-dark: #142764;
    --blue-bright: #2a52be;
    --cream: #f7f1e3;
    --bg-mid: #0a1234;   /* page background mid/outer (derived from brand bg color) */
    --bg-bot: #060a1f;
    --black: #0c0c0c;
    --charcoal: #1a1a1a;
    --panel: #222;
    --ink: #fff8e7;
    --ink-dim: #d9c9a0;
    --good: var(--yellow);
    --shadow: 0 24px 70px rgba(0,0,0,.55);
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    height: 100%;
    background:
      radial-gradient(1400px 900px at 50% -15%, var(--blue-dark) 0%, var(--bg-mid) 60%, var(--bg-bot) 100%);
    color: var(--ink);
    font-family: "Anton", "Oswald", "Impact", "Bebas Neue", ui-sans-serif, system-ui, "Segoe UI", Roboto, sans-serif;
    overflow: hidden;
    user-select: none;
    -webkit-user-select: none;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    text-rendering: optimizeLegibility;
  }
  body::before {
    content: "";
    position: fixed; inset: 0;
    background-image:
      repeating-linear-gradient(45deg, rgba(244,196,48,.035) 0 14px, transparent 14px 28px);
    pointer-events: none;
    z-index: 0;
  }
  /* ---- Background styles (set by the theme; default is the gradient above) ---- */
  body.bg-solid { background: var(--bg-bot); }
  body.bg-spotlight { background: radial-gradient(1100px 720px at 50% -8%, var(--blue-bright) 0%, var(--bg-mid) 42%, var(--bg-bot) 100%); }
  body.bg-stripes { background: radial-gradient(1400px 900px at 50% -15%, var(--blue-dark) 0%, var(--bg-mid) 60%, var(--bg-bot) 100%); }
  body.bg-image { background: linear-gradient(rgba(6,10,31,.55), rgba(6,10,31,.68)), var(--bg-image, none) center / cover no-repeat fixed; }
  body.bg-stripes::before { background-image: repeating-linear-gradient(45deg, rgba(255,255,255,.06) 0 16px, transparent 16px 34px); }
  body.bg-solid::before, body.bg-spotlight::before, body.bg-image::before { opacity: 0; }
  body.bg-plain::before { opacity: 0; }   /* hide the diagonal texture for custom background styles */
  /* ---- Freeform design overlay (custom text boxes + images placed per screen) ---- */
  #designOverlay { position: absolute; inset: 0; z-index: 45; pointer-events: none; }
  #designOverlay .de-text { position: absolute; line-height: 1.15; white-space: pre-wrap; word-break: break-word; }
  #designOverlay .de-img { position: absolute; height: auto; display: block; }
  /* The whole UI is laid out on a fixed 1920×1080 "stage" and scaled uniformly to
     fit any screen (1080p TV = 1×, 720p TV = 0.667×, laptops = proportional).
     This keeps every element in the exact same place at every resolution, so
     nothing overlaps no matter the screen size. */
  body {
    display: flex;
    align-items: center;
    justify-content: center;
  }
  #app {
    position: relative;
    width: 1920px;
    height: 1080px;
    flex: 0 0 auto;
    display: flex;
    flex-direction: column;
    z-index: 1;
    transform: scale(var(--scale, 1));
    transform-origin: center center;
  }

  /* Header bar */
  header {
    position: relative;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 32px;   /* slim bar that mirrors the footer */
    min-height: 0;
    background: var(--blue-dark);
    box-shadow: 0 8px 30px rgba(0,0,0,.5);
  }
  header::after {
    content: "";
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 9px;
    border-top: 2px solid var(--black);
    background: linear-gradient(180deg,
      var(--blue) 0,
      var(--blue) 33.33%,
      var(--yellow) 33.33%,
      var(--yellow) 66.66%,
      var(--red) 66.66%,
      var(--red) 100%);
  }
  header .meta { position: relative; z-index: 2; }
  .brand {
    position: absolute;
    left: 50%; top: 50%;
    transform: translate(-50%, -50%);
    z-index: 2;
    display: flex;
    align-items: center;
    gap: 16px;
    font-weight: 900;
    letter-spacing: 2px;
  }
  .brand .logo {
    width: 64px; height: 64px;
    border-radius: 12px;
    background: var(--cream);
    display: grid;
    place-items: center;
    font-size: 46px;
    font-weight: 900;
    color: var(--red);
    text-shadow: 2px 2px 0 var(--blue);
    box-shadow: 0 6px 18px rgba(0,0,0,.4), inset 0 -3px 0 rgba(0,0,0,.12);
    border: 3px solid var(--black);
    transform: rotate(-4deg);
  }
  .brand .brand-logo-img {
    height: 72px;
    width: auto;
    max-width: 260px;
    object-fit: contain;
    filter: drop-shadow(0 4px 8px rgba(0,0,0,.5));
  }
  .brand .name {
    font-size: 38px;
    color: var(--yellow);
    text-shadow: 3px 3px 0 var(--black);
    line-height: 1;
  }
  .brand .name small {
    display: block;
    font-size: 14px;
    color: var(--cream);
    letter-spacing: 6px;
    margin-top: 4px;
    text-shadow: 1px 1px 0 rgba(0,0,0,.2);
  }
  /* "DON'T CHEAT!" badge — now on the left of the header (logo took the center). */
  .dont-cheat {
    position: relative;
    z-index: 2;
    transform: rotate(-2deg);
    background: var(--red);
    color: var(--yellow);
    border: 3px solid var(--black);
    border-radius: 12px;
    padding: 6px 22px;
    font-size: 24px;
    font-weight: 900;
    letter-spacing: 2px;
    text-shadow: 2px 2px 0 var(--black);
    white-space: nowrap;
    z-index: 3;
    box-shadow: 0 4px 12px rgba(0,0,0,.4);
  }
  @media (max-width: 760px) {
    .dont-cheat { font-size: 15px; padding: 4px 12px; }
  }
  .meta {
    display: flex;
    gap: 14px;
    font-size: 18px;
    letter-spacing: 2px;
    color: var(--blue);
  }
  .meta .chip {
    background: var(--cream);
    border: 3px solid var(--blue);
    border-radius: 8px;
    padding: 8px 16px;
    font-weight: 900;
    color: var(--red);
  }
  .meta .chip b { color: var(--blue); }

  main {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 28px;
    min-height: 0;
  }
  .view {
    width: 100%;
    max-width: 1500px;
    text-align: center;
  }
  /* Question/answer screens fill the whole board height so the content (badge,
     category, question box, "just walked in") spans ~85% of the screen instead
     of floating compactly in the middle. */
  .view.view-fill { height: 100%; max-width: 1600px; }
  .view-fill .q-screen { padding: 34px 0; }   /* a little breathing room top/bottom (~85% fill) */

  /* Title screen */
  .title-wrap { padding: 40px 0; }
  .title-logo {
    position: relative;
    width: 320px; height: 200px;
    margin: 0 auto 24px;
    border-radius: 18px;
    background:
      linear-gradient(135deg,
        var(--red) 0,
        var(--red) 11.5%, var(--black) 11.5%, var(--black) 12.5%,
        var(--blue) 12.5%, var(--blue) 26%, var(--black) 26%, var(--black) 27%,
        var(--yellow) 27%, var(--yellow) 73%, var(--black) 73%, var(--black) 74%,
        var(--blue) 74%, var(--blue) 87.5%, var(--black) 87.5%, var(--black) 88.5%,
        var(--red) 88.5%, var(--red) 100%
      );
    display: grid;
    place-items: center;
    box-shadow: 0 24px 60px rgba(0,0,0,.6);
    border: 6px solid var(--black);
  }
  .title-logo .logo-p {
    font-size: 140px;
    font-weight: 900;
    color: var(--red);
    line-height: 1;
    text-shadow:
      4px 4px 0 var(--blue),
      8px 8px 0 var(--black);
  }
  .title-logo-img {
    display: block;
    width: auto;
    max-width: min(775px, 90vw);
    max-height: 350px;
    margin: 0 auto 24px;
    filter: drop-shadow(0 18px 32px rgba(0,0,0,.6));
  }
  h1.title {
    font-family: var(--title-font, "Anton","Oswald",Impact,sans-serif);
    font-size: 130px;
    line-height: .95;
    margin: 0 0 8px;
    color: var(--red);
    text-shadow:
      5px 5px 0 var(--yellow),
      10px 10px 0 var(--blue),
      14px 14px 0 var(--black);
    letter-spacing: 4px;
  }
  h1.title .sub {
    display: block;
    font-size: 80px;
    color: var(--yellow);
    text-shadow:
      4px 4px 0 var(--blue),
      8px 8px 0 var(--black);
    letter-spacing: 14px;
    margin-top: 8px;
  }
  .lead {
    color: var(--ink);
    font-size: 30px;
    margin: 22px auto 32px;
    max-width: 960px;
    letter-spacing: 2px;
    line-height: 1.5;
  }
  .lead b { color: var(--yellow); }
  .win-prizes {
    position: fixed;
    left: 72px;
    top: 50%;
    transform: translateY(-50%) rotate(-8deg);
    width: 260px;
    height: 260px;
    border-radius: 50%;
    background: radial-gradient(circle at 50% 38%, var(--yellow-bright), var(--yellow) 70%);
    border: 8px solid var(--red);
    box-shadow: 0 0 0 6px var(--blue), 0 18px 40px rgba(0,0,0,.55);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    line-height: .9;
    z-index: 5;
  }
  .win-prizes .wp-top {
    color: var(--blue);
    font-size: 50px;
    font-weight: 900;
    letter-spacing: 4px;
    text-shadow: 2px 2px 0 rgba(0,0,0,.15);
  }
  .win-prizes .wp-big {
    color: var(--red);
    font-size: 70px;
    font-weight: 900;
    letter-spacing: 2px;
    text-shadow: 3px 3px 0 var(--black);
  }
  .instructions {
    position: fixed;
    right: 36px;
    top: 50%;
    transform: translateY(-50%) rotate(2deg);
    width: 460px;
    background: #ffffff;
    border: 6px solid var(--red);
    border-radius: 18px;
    box-shadow: 0 0 0 7px var(--blue), 0 20px 46px rgba(0,0,0,.55);
    padding: 0 0 26px;
    text-align: left;
    overflow: hidden;
    z-index: 5;
  }
  .instructions .instr-header {
    background: var(--red);
    color: var(--yellow);
    font-size: 40px;
    font-weight: 900;
    letter-spacing: 3px;
    padding: 16px 18px;
    text-align: center;
    text-shadow: 2px 2px 0 var(--black);
    border-bottom: 5px solid var(--black);
  }
  .instructions .instr-list {
    margin: 26px 0 0;
    padding: 0 28px 0 62px;
    color: var(--blue-dark);
  }
  .instructions .instr-list li {
    font-size: 30px;
    font-weight: 800;
    line-height: 1.35;
    margin-bottom: 22px;
    letter-spacing: .3px;
  }
  .instructions .instr-list li:last-child { margin-bottom: 0; }
  .instructions .instr-list li b { color: var(--red); }

  /* Host's HOST GUIDE panel — more compact than the TVs' player instructions */
  #main .instructions {
    width: 440px;
    top: 128px; bottom: 64px; height: auto;   /* sits between the header & footer stripes */
    transform: none;                          /* no tilt → corners can't poke into the lines */
    display: flex; flex-direction: column; padding-bottom: 0;
  }
  #main .instructions .instr-header { font-size: 44px; padding: 22px 16px; flex: 0 0 auto; }
  #main .instructions .instr-list { flex: 1; display: flex; flex-direction: column; justify-content: space-evenly; margin: 0; padding: 16px 30px 16px 58px; }
  #main .instructions .instr-list li { font-size: 36px; margin: 0; line-height: 1.25; }

  @media (max-width: 1100px) {
    .win-prizes { width: 150px; height: 150px; left: 16px; border-width: 6px; }
    .win-prizes .wp-top { font-size: 28px; }
    .win-prizes .wp-big { font-size: 38px; }
    .instructions { width: 320px; right: 14px; }
    .instructions .instr-header { font-size: 30px; }
    .instructions .instr-list { padding: 0 18px 0 46px; }
    .instructions .instr-list li { font-size: 22px; margin-bottom: 16px; }
  }

  .grab-sheet {
    display: inline-block;
    margin: 24px auto 8px;
    padding: 18px 42px;
    background: var(--yellow);
    color: var(--red);
    border: 4px solid var(--black);
    border-radius: 14px;
    font-size: 42px;
    font-weight: 900;
    letter-spacing: 2px;
    text-shadow: 2px 2px 0 var(--blue);
    box-shadow: 0 8px 0 var(--blue-dark), 0 14px 26px rgba(0,0,0,.5);
    transform: rotate(-2deg);
  }

  /* Buttons */
  .btn {
    background: linear-gradient(180deg, var(--red) 0%, var(--red-dark) 100%);
    color: var(--cream);
    border: 4px solid var(--black);
    border-radius: 14px;
    padding: 22px 48px;
    font-size: 28px;
    font-weight: 900;
    letter-spacing: 3px;
    cursor: pointer;
    box-shadow: 0 10px 0 var(--blue-dark), 0 18px 30px rgba(0,0,0,.5);
    transition: transform .08s ease, box-shadow .12s ease, filter .15s ease;
    font-family: inherit;
    text-transform: uppercase;
    text-shadow: 2px 2px 0 var(--black);
  }
  .btn:hover { filter: brightness(1.08); }
  .btn:active {
    transform: translateY(6px);
    box-shadow: 0 4px 0 var(--blue-dark), 0 8px 16px rgba(0,0,0,.5);
  }
  .btn.ghost {
    background: transparent;
    color: var(--yellow);
    border-color: var(--yellow);
    box-shadow: none;
    text-shadow: none;
  }
  .btn-row { display: flex; gap: 18px; justify-content: center; flex-wrap: wrap; }
  /* Title screen has 4 wide actions — lay them out 2×2 so none overflow/overlap. */
  .title-wrap .btn-row {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 18px;
    max-width: 940px;
    margin-left: auto;
    margin-right: auto;
  }
  .title-wrap .btn-row .btn { width: 100%; }

  .hint {
    margin-top: 28px;
    color: var(--cream);
    font-size: 16px;
    letter-spacing: 2px;
  }
  .hint kbd {
    display: inline-block;
    background: var(--yellow);
    color: var(--red);
    border: 2px solid var(--black);
    border-bottom-width: 4px;
    border-radius: 6px;
    padding: 4px 10px;
    margin: 0 4px;
    font-family: inherit;
    font-size: 14px;
    font-weight: 900;
  }

  /* Round intro */
  @keyframes round-label-in {
    0%   { opacity: 0; transform: translateY(-24px); letter-spacing: 4px; }
    100% { opacity: 1; transform: translateY(0); letter-spacing: 18px; }
  }
  @keyframes round-number-pop {
    0%   { opacity: 0; transform: scale(.4) rotate(-8deg); }
    60%  { opacity: 1; transform: scale(1.08) rotate(2deg); }
    100% { opacity: 1; transform: scale(1) rotate(0); }
  }
  @keyframes round-rise {
    0%   { opacity: 0; transform: translateY(28px); }
    100% { opacity: 1; transform: translateY(0); }
  }
  .round-intro {
    padding: 40px;
  }
  .round-label {
    font-size: 48px;
    letter-spacing: 18px;
    color: var(--cream);
    text-shadow: 3px 3px 0 var(--blue);
    margin-bottom: 8px;
    animation: round-label-in .35s ease-out both;
  }
  .round-number {
    font-size: 220px;
    line-height: 1;
    color: var(--yellow);
    text-shadow:
      6px 6px 0 var(--red),
      12px 12px 0 var(--blue),
      18px 18px 0 var(--black);
    margin: 0;
    animation: round-number-pop .5s cubic-bezier(.2,.8,.3,1.2) .12s both;
  }
  .round-category {
    font-size: 84px;
    color: var(--red);
    text-shadow:
      4px 4px 0 var(--yellow),
      8px 8px 0 var(--black);
    margin: 16px 0 8px;
    letter-spacing: 6px;
    animation: round-rise .4s ease-out .42s both;
  }
  .round-count {
    font-size: 26px;
    color: var(--cream);
    letter-spacing: 4px;
    margin-bottom: 32px;
    animation: round-rise .4s ease-out .55s both;
  }

  /* Question screen */
  .q-screen {
    display: flex;
    flex-direction: column;
    gap: 18px;
    height: 100%;
    position: relative;   /* anchor for the host scoreboard panel */
  }
  /* Host-only scoreboard panel — top-center of the question screen (between the
     QUESTION badge and the category). Hidden on the TVs. */
  .q-topbar-left { display: flex; align-items: center; gap: 22px; }
  /* The question top bar spans the FULL stage width so the logo can sit at the actual
     top-left corner. A 1fr/auto/1fr grid keeps the scoreboard pinned to the true
     center and the category to the right, regardless of the logo's width.
     The content area is centered with a ~160px inset, so -160 + width 1920 = full bleed. */
  .q-topbar.q-topbar--full {
    width: 1920px; max-width: none; margin-left: -160px; padding: 0 28px; box-sizing: border-box;
    display: grid; grid-template-columns: 1fr auto 1fr;
    /* Center pills vertically within the bar (against the logo when present) via LAYOUT,
       not a transform — transforms don't reserve space and would bleed into the box below. */
    align-items: center;
  }
  .q-topbar--full .q-category { justify-self: end; transform: translateX(-120px); }
  /* Center the badge/timer against the logo (no logo → they just sit at the bar's height). */
  .q-topbar--full .q-topbar-left { align-items: center; }
  /* Big brand logo in the actual top-left corner of each question. */
  .q-corner-logo { height: 150px; max-width: 310px; object-fit: contain; display: block; }
  .q-score {
    background: var(--yellow); color: var(--red);
    border: 4px solid var(--black); border-radius: 12px;
    font-size: 30px; font-weight: 900; letter-spacing: 2px;
    padding: 12px 64px; white-space: nowrap; cursor: pointer;
    box-shadow: 0 8px 20px rgba(0,0,0,.45);
  }
  body.display-mode .q-score { display: none; }
  .q-main {
    flex: 1;
    min-height: 0;
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 14px;
  }
  /* TVs match the host: the timer lives inside the top bar (between the QUESTION
     badge and the category), so the question flows below naturally — no extra
     padding, no dropping the question down. */
  .q-topbar {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 24px;
    animation: q-badge-drop .3s ease-out both;
  }
  /* Timer + SCOREBOARD pill stacked in the top-center, above the question. */
  .q-topcenter { display: flex; flex-direction: column; align-items: center; gap: 12px; }
  .q-badge {
    background: var(--blue);
    border: 5px solid var(--black);
    border-radius: 14px;
    padding: 14px 34px;
    font-family: var(--label-font, "Anton","Oswald",Impact,sans-serif);
    font-size: 44px;
    letter-spacing: 4px;
    color: var(--yellow);
    text-shadow: 2px 2px 0 var(--black);
  }
  .q-category {
    background: var(--red);
    border: 5px solid var(--black);
    border-radius: 14px;
    padding: 14px 34px;
    font-family: var(--label-font, "Anton","Oswald",Impact,sans-serif);
    font-size: 48px;
    letter-spacing: 4px;
    color: var(--yellow);
    text-shadow: 2px 2px 0 var(--black);
  }
  @keyframes q-enter {
    0%   { opacity: 0; transform: translateX(48px) scale(.97); }
    100% { opacity: 1; transform: translateX(0) scale(1); }
  }
  @keyframes q-badge-drop {
    0%   { opacity: 0; transform: translateY(-16px); }
    100% { opacity: 1; transform: translateY(0); }
  }
  .q-text {
    flex: 1;                       /* grow to fill the middle of the board */
    width: 100%;
    max-width: var(--qbox-w, 100%);
    align-self: center;            /* center when narrowed */
    display: flex;
    align-items: center;
    justify-content: center;       /* center the question text inside the big box */
    animation: q-enter .3s cubic-bezier(.2,.7,.3,1) both;
    font-family: var(--q-font, "Anton","Oswald",Impact,sans-serif);
    font-size: 104px;
    line-height: 1.16;
    color: var(--cream);
    background: var(--qbox-bg, linear-gradient(180deg, var(--blue-dark), #0a1234));
    border: 5px solid var(--qbox-border, var(--yellow));
    border-radius: 22px;
    padding: 40px 50px;
    box-shadow: var(--shadow);
    letter-spacing: 1px;
    overflow: hidden;   /* text is sized to fit; never spill out of the box */
  }
  .q-text-body { width: 100%; }
  .q-text .q-num {
    display: inline-block;
    background: var(--yellow);
    color: var(--red);
    border: 3px solid var(--black);
    border-radius: 12px;
    padding: 4px 18px;
    margin-right: 18px;
    font-size: 0.8em;          /* scales with the auto-fitted question text */
    vertical-align: middle;
    text-shadow: 2px 2px 0 rgba(0,0,0,.15);
  }
  .choices {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 18px;
  }
  .choice {
    display: flex;
    align-items: center;
    gap: 22px;
    background: var(--cream);
    border: 4px solid var(--black);
    border-radius: 16px;
    padding: 22px 28px;
    font-size: 34px;
    text-align: left;
    color: var(--blue-dark);
    transition: transform .15s, border-color .15s, background .25s;
    box-shadow: 0 6px 0 rgba(0,0,0,.25);
  }
  .choice .letter {
    flex: 0 0 70px;
    height: 70px;
    border-radius: 14px;
    background: var(--red);
    color: var(--cream);
    display: grid;
    place-items: center;
    font-size: 42px;
    font-weight: 900;
    text-shadow: 2px 2px 0 var(--black);
    border: 3px solid var(--black);
  }
  .choice:nth-child(2) .letter,
  .choice:nth-child(3) .letter {
    background: var(--blue);
  }
  .choice.reveal-correct {
    background: linear-gradient(180deg, var(--yellow-bright), var(--yellow));
    border-color: var(--red);
    transform: scale(1.03);
    box-shadow: 0 10px 30px rgba(244,196,48,.5), 0 0 0 4px var(--blue) inset;
  }
  .choice.reveal-correct .letter {
    background: var(--red);
    color: var(--cream);
    border-color: var(--black);
  }
  .choice.reveal-correct .choice-text {
    color: var(--red);
    font-weight: 900;
    text-shadow: 1px 1px 0 rgba(0,0,0,.1);
  }
  .choice.reveal-dim {
    opacity: .35;
  }

  /* Answer reveal banner */
  .reveal-banner {
    margin-top: 12px;
    font-size: 36px;
    color: var(--yellow);
    letter-spacing: 4px;
    text-shadow:
      3px 3px 0 var(--red),
      6px 6px 0 var(--black);
    animation: pop .35s ease;
  }
  @keyframes pop {
    0% { transform: scale(.85); opacity: 0; }
    100% { transform: scale(1); opacity: 1; }
  }

  /* Round end */
  .round-end h2 {
    font-size: 100px;
    color: var(--red);
    text-shadow:
      6px 6px 0 var(--yellow),
      12px 12px 0 var(--blue),
      18px 18px 0 var(--black);
    margin: 0 0 20px;
    letter-spacing: 4px;
  }
  .round-end .answers-list {
    background: var(--cream);
    border: 5px solid var(--blue);
    border-radius: 18px;
    padding: 30px;
    margin: 24px auto;
    max-width: 1100px;
    box-shadow: var(--shadow);
    text-align: left;
  }
  .answers-list ol {
    columns: 2;
    column-gap: 60px;
    margin: 0;
    padding-left: 24px;
    font-size: 26px;
    line-height: 1.7;
    color: var(--blue-dark);
  }
  .answers-list ol b { color: var(--red); }

  /* End screen */
  .end h2 {
    font-size: 110px;
    color: var(--red);
    text-shadow:
      6px 6px 0 var(--yellow),
      12px 12px 0 var(--blue),
      18px 18px 0 var(--black);
    margin: 0 0 20px;
    letter-spacing: 6px;
  }
  .end p {
    font-size: 30px;
    color: var(--cream);
    letter-spacing: 3px;
    margin-bottom: 36px;
  }

  /* Footer */
  footer {
    position: relative;
    padding: 14px 32px;
    background: var(--blue-dark);
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 14px;
    letter-spacing: 3px;
    color: var(--cream);
  }
  footer::before {
    content: "";
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 9px;
    border-bottom: 2px solid var(--black);
    background: linear-gradient(180deg,
      var(--red) 0,
      var(--red) 33.33%,
      var(--yellow) 33.33%,
      var(--yellow) 66.66%,
      var(--blue) 66.66%,
      var(--blue) 100%);
  }
  footer .controls span { margin-right: 18px; }
  footer kbd {
    background: var(--cream);
    color: var(--red);
    border: 1px solid var(--black);
    border-bottom-width: 2px;
    border-radius: 4px;
    padding: 2px 8px;
    margin: 0 2px;
    font-family: inherit;
    font-weight: 900;
  }

  /* Round-end answer review */
  .round-end-answers {
    display: flex;
    flex-direction: column;
    height: 100%;
    max-height: calc(100vh - 200px);
    gap: 14px;
    text-align: center;
  }
  .round-end-header h2 {
    font-size: 56px;
    margin: 0 0 4px;
  }
  .round-end-answers .round-category {
    text-shadow: 3px 3px 0 var(--yellow), 5px 5px 0 var(--black);
  }
  .qa-list {
    flex: 1;
    min-height: 0;
    overflow: hidden;
    background: var(--cream);
    border: 5px solid var(--blue);
    border-radius: 18px;
    padding: 18px 26px;
    box-shadow: var(--shadow);
    text-align: left;
    color: var(--blue-dark);
  }
  .qa-list ol {
    list-style: none;
    margin: 0;
    padding: 0;
    columns: 2;
    column-gap: 40px;
    column-rule: 2px dashed rgba(29,58,138,.25);
  }
  /* Font sizes are driven by a base font-size set on .qa-list by JS (auto-fit).
     Everything below is in em so the whole list scales together. */
  .qa-list { font-size: 40px; }
  .qa-item {
    break-inside: avoid;
    page-break-inside: avoid;
    padding: .3em 0;
    border-bottom: 1px dashed rgba(29,58,138,.15);
  }
  .qa-item:last-child { border-bottom: 0; }
  .qa-q {
    font-weight: 900;
    color: var(--blue-dark);
    line-height: 1.15;
    font-size: 1em;
  }
  .qa-num {
    display: inline-block;
    color: var(--red);
    margin-right: .2em;
    font-weight: 900;
  }
  .qa-a {
    color: var(--red);
    margin-top: .05em;
    line-height: 1.12;
    padding-left: .1em;
    font-size: .86em;
  }
  .qa-a b {
    color: var(--blue);
    letter-spacing: 1px;
    margin-right: 4px;
    font-size: .85em;
  }

  .round-end-footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 24px;
    padding-top: 4px;
  }
  .round-end-footer .lead-inline {
    color: var(--cream);
    font-size: 22px;
    letter-spacing: 3px;
  }

  /* Status pill on title screen */
  .status-pill {
    display: inline-block;
    background: var(--cream);
    color: var(--blue-dark);
    border: 4px solid var(--blue);
    border-radius: 999px;
    padding: 14px 36px;
    font-size: 30px;
    letter-spacing: 2px;
    margin: 0 0 24px;
    font-weight: 900;
  }
  .status-pill b { color: var(--red); }
  .status-pill.custom { border-color: var(--red); }
  .status-pill.custom b { color: var(--blue); }

  /* Modal */
  /* Go-live dialog helpers */
  .gl-warn { background:#fdecea; border:2px solid var(--red); color:#9b1c1c; font-weight:800;
             border-radius:10px; padding:10px 14px; margin:6px 0 2px; }
  .gl-ok   { background:#e7f6ec; border:2px solid #2e7d32; color:#1b5e20; font-weight:800;
             border-radius:10px; padding:10px 14px; margin:6px 0 2px; }
  .gl-foot { font-size:13px; opacity:.75; margin:14px 0 0; }
  #glUrl { font-weight:800; letter-spacing:.3px; }
  .modal-backdrop {
    position: fixed;
    inset: 0;
    background: rgba(6, 10, 31, .85);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 100;
    padding: 24px;
    overflow-y: auto;
  }
  .modal {
    background: var(--cream);
    color: var(--blue-dark);
    border: 6px solid var(--blue);
    border-radius: 20px;
    box-shadow: 0 30px 80px rgba(0,0,0,.6);
    width: 100%;
    max-width: 720px;
    max-height: 92vh;
    overflow-y: auto;
    padding: 28px 32px;
    position: relative;
  }
  .modal::before {
    content: "";
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 14px;
    background: linear-gradient(180deg,
      var(--red) 0,
      var(--red) 50%,
      var(--yellow) 50%,
      var(--yellow) 100%);
    border-radius: 14px 14px 0 0;
  }
  .modal h2 {
    margin: 18px 0 6px;
    color: var(--red);
    font-size: 38px;
    letter-spacing: 3px;
    text-shadow: 2px 2px 0 var(--yellow);
  }
  .modal .modal-lead {
    color: var(--blue-dark);
    font-size: 16px;
    line-height: 1.5;
    margin: 0 0 20px;
    letter-spacing: 1px;
  }
  .modal .field {
    margin-bottom: 20px;
  }
  .modal label {
    display: block;
    font-size: 16px;
    color: var(--red);
    letter-spacing: 3px;
    margin-bottom: 8px;
    font-weight: 900;
  }
  .modal input[type="file"] {
    display: block;
    width: 100%;
    padding: 10px;
    background: #fff;
    border: 2px dashed var(--blue);
    border-radius: 8px;
    font-family: inherit;
    color: var(--blue-dark);
  }
  .modal textarea {
    width: 100%;
    min-height: 180px;
    padding: 14px;
    background: #fff;
    border: 2px solid var(--blue);
    border-radius: 8px;
    font-family: ui-monospace, "Consolas", "Courier New", monospace;
    font-size: 14px;
    color: var(--blue-dark);
    resize: vertical;
    line-height: 1.5;
  }
  .modal input[type="text"] {
    width: 100%;
    padding: 14px 16px;
    background: #fff;
    border: 2px solid var(--blue);
    border-radius: 10px;
    font-family: inherit;
    font-size: 22px;
    font-weight: 800;
    color: var(--blue-dark);
    box-sizing: border-box;
  }
  .modal textarea:focus, .modal input[type="file"]:focus, .modal input[type="text"]:focus {
    outline: none;
    border-color: var(--red);
  }
  .format-tabs {
    display: flex;
    gap: 0;
    margin-bottom: 12px;
    border-bottom: 3px solid var(--blue);
  }
  .format-tab {
    background: transparent;
    border: 0;
    border-bottom: 4px solid transparent;
    margin-bottom: -3px;
    padding: 10px 18px;
    font-family: inherit;
    font-size: 14px;
    letter-spacing: 2px;
    font-weight: 900;
    color: var(--blue);
    cursor: pointer;
  }
  .format-tab.active {
    color: var(--red);
    border-bottom-color: var(--red);
  }
  .format-help {
    background: rgba(29, 58, 138, .08);
    border-left: 4px solid var(--blue);
    padding: 10px 14px;
    margin: 0 0 10px;
    font-size: 13px;
    font-family: ui-monospace, "Consolas", "Courier New", monospace;
    color: var(--blue-dark);
    white-space: pre;
    overflow-x: auto;
    border-radius: 0 6px 6px 0;
  }
  .modal-actions {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    justify-content: flex-end;
    margin-top: 24px;
    padding-top: 20px;
    border-top: 2px solid rgba(29, 58, 138, .2);
  }
  /* ---- BUILD-YOUR-OWN sheet ---- */
  .bld-controls {
    display: flex; flex-wrap: wrap; align-items: flex-end; gap: 14px;
    background: rgba(29, 58, 138, .07); border: 2px solid rgba(29,58,138,.25);
    border-radius: 12px; padding: 14px 16px; margin-bottom: 18px;
  }
  .bld-num { display: flex; flex-direction: column; }
  .bld-num label { margin-bottom: 6px; font-size: 13px; }
  .bld-num input[type="number"] {
    width: 120px; padding: 10px 12px; font-size: 22px; font-weight: 900;
    border: 2px solid var(--blue); border-radius: 8px; background: #fff;
    color: var(--blue-dark); box-sizing: border-box; text-align: center;
  }
  .bld-num input[type="number"]:focus { outline: none; border-color: var(--red); }
  .bld-total { margin-left: auto; align-self: center; font-weight: 900; color: var(--red);
    letter-spacing: 1px; font-size: 15px; }
  #builderGrid { display: flex; flex-direction: column; gap: 16px; }
  .bld-cat { border: 2px solid var(--blue); border-radius: 12px; padding: 14px; background: #fff; }
  .bld-cat-head { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
  .bld-cat-no { background: var(--red); color: var(--cream); font-weight: 900; border-radius: 8px;
    padding: 8px 12px; white-space: nowrap; letter-spacing: 1px; font-size: 13px; }
  .bld-qrow { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
  .bld-qn { width: 28px; text-align: right; font-weight: 900; color: var(--blue); flex: 0 0 auto; }
  .modal input[type="text"].bld-catname { flex: 1; padding: 10px 12px; font-size: 18px; }
  .modal input[type="text"].bld-q { flex: 2; padding: 9px 11px; font-size: 15px; font-weight: 600; }
  .modal input[type="text"].bld-a { flex: 1; padding: 9px 11px; font-size: 15px; font-weight: 600; }
  /* ---- Branding modal ---- */
  .brand-colors { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .brand-color { display: flex; align-items: center; justify-content: space-between; gap: 12px;
    background: #fff; border: 2px solid var(--blue); border-radius: 10px; padding: 8px 14px;
    font-size: 15px; font-weight: 800; color: var(--blue-dark); }
  .brand-color input[type="color"] { width: 56px; height: 40px; border: 2px solid var(--blue);
    border-radius: 8px; background: #fff; cursor: pointer; padding: 2px; flex: 0 0 auto; }
  .brand-logo-row { display: flex; gap: 16px; align-items: center; flex-wrap: wrap; }
  .brand-logo-preview { width: 210px; min-height: 96px; display: flex; align-items: center;
    justify-content: center; background: var(--blue-dark); border: 2px solid var(--blue);
    border-radius: 10px; padding: 10px; color: var(--cream); flex: 0 0 auto; }
  .brand-logo-btns { display: flex; flex-direction: column; gap: 8px; flex: 1; min-width: 220px; }
  .brand-logo-btns .btn { padding: 10px 14px; font-size: 15px; }
  .modal .btn {
    padding: 14px 28px;
    font-size: 18px;
    box-shadow: 0 6px 0 var(--blue-dark);
  }
  .modal .btn:active {
    box-shadow: 0 2px 0 var(--blue-dark);
  }
  .modal .btn.secondary {
    background: var(--cream);
    color: var(--blue);
    border-color: var(--blue);
    text-shadow: none;
    box-shadow: 0 6px 0 var(--blue-dark);
  }
  .modal .btn.danger {
    background: var(--yellow);
    color: var(--red);
    text-shadow: none;
  }
  .modal .error-msg {
    background: var(--red);
    color: var(--cream);
    padding: 10px 14px;
    border-radius: 8px;
    font-size: 14px;
    letter-spacing: 1px;
    margin-bottom: 12px;
    border: 2px solid var(--black);
  }
  .modal .ok-msg {
    background: var(--blue);
    color: var(--yellow);
    padding: 10px 14px;
    border-radius: 8px;
    font-size: 14px;
    letter-spacing: 1px;
    margin-bottom: 12px;
    border: 2px solid var(--black);
  }
  .modal .close-x {
    position: absolute;
    top: 22px;
    right: 18px;
    background: transparent;
    border: 0;
    color: var(--blue);
    font-size: 28px;
    font-weight: 900;
    cursor: pointer;
    line-height: 1;
    padding: 4px 10px;
    z-index: 2;
  }
  .modal .close-x:hover { color: var(--red); }

  @media (max-width: 900px) {
    h1.title { font-size: 80px; }
    h1.title .sub { font-size: 50px; letter-spacing: 8px; }
    .q-text { font-size: 36px; padding: 28px; }

    .choice .letter { flex-basis: 54px; height: 54px; font-size: 32px; }
    .choices { grid-template-columns: 1fr; }
    .round-number { font-size: 140px; }
    .round-category { font-size: 56px; letter-spacing: 4px; }

  /* ---- Live multi-screen sync ---- */
  #liveBanner {
    position: fixed;
    bottom: 76px;            /* sits ABOVE the footer keyboard-hint bar so they never overlap */
    left: 18px;
    z-index: 50;
    display: flex;
    align-items: center;
    gap: 14px;
    background: var(--blue-dark);
    border: 3px solid var(--yellow);
    border-radius: 14px;
    padding: 12px 16px;
    box-shadow: 0 12px 30px rgba(0,0,0,.5);
    color: var(--cream);
    max-width: 420px;
  }
  #liveBanner .lb-dot {
    width: 14px; height: 14px; border-radius: 50%;

    box-shadow: 0 0 0 0 rgba(46,213,115,.7);
    animation: lb-pulse 1.6s infinite;
  }

    0%   { box-shadow: 0 0 0 0 rgba(46,213,115,.6); }

  #liveBanner .lb-info { text-align: left; min-width: 0; }

  #liveBanner .lb-code { font-size: 44px; font-weight: 900; color: var(--yellow); letter-spacing: 8px; line-height: 1; margin: 4px 0 2px; }
  #liveBanner .lb-howto { font-size: 11px; color: #cfe8ff; margin-top: 4px; line-height: 1.4; max-width: 240px; }
  #liveBanner .lb-howto b { color: #fff; }
  #liveBanner .lb-warn { font-size: 11px; color: var(--yellow); margin-top: 6px; line-height: 1.35; max-width: 240px; }
  #liveBanner .lb-warn b { color: #fff; }

  /* TV "enter room code" setup screen */
  .code-entry { text-align: center; display: flex; flex-direction: column; align-items: center; gap: 18px; padding: 40px; }
  .code-entry .ce-title { font-size: 64px; color: var(--yellow); margin: 0; letter-spacing: 6px; text-shadow: 3px 3px 0 var(--blue); }

  /* "How to play" line under the question — TV displays only (for mid-game joiners). */

    display: block;
    align-self: center;

    margin-top: 6px;

    font-weight: 600;

  #liveBanner .lb-qr { background: #fff; padding: 5px; border-radius: 8px; flex: 0 0 auto; }

  body.display-mode #main .hint,
  body.display-mode #main .setup-row,
  body.display-mode #main .loc-bar,

  /* ---- GET NEW QUESTIONS modal (Open Trivia DB categories + AI topics) ---- */
  .nq-diff { display: flex; gap: 8px; flex-wrap: wrap; }
  .nq-diff button { flex: 1; min-width: 78px; padding: 10px; border: 3px solid var(--blue); border-radius: 10px;
    background: #fff; color: var(--blue-dark); font-weight: 900; font-size: 15px; letter-spacing: 1px; cursor: pointer; }
  .nq-diff button.active { background: var(--blue); color: var(--cream); }
  .nq-search { width: 100%; box-sizing: border-box; padding: 10px 12px; font-size: 15px; border: 2px solid var(--blue);
    border-radius: 10px; margin-bottom: 8px; }
  .nq-cats { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; max-height: 210px; overflow-y: auto;
    border: 2px solid rgba(29,58,138,.25); border-radius: 10px; padding: 8px; }
  .nq-cat { display: flex; align-items: center; gap: 8px; padding: 7px 9px; border-radius: 8px; cursor: pointer;
    font-size: 14px; font-weight: 700; color: var(--blue-dark); border: 2px solid transparent; }
  .nq-cat.on { background: rgba(29,58,138,.12); border-color: var(--blue); }
  .nq-cat input { width: 18px; height: 18px; flex: none; }
  .nq-row { display: flex; gap: 8px; }
  .nq-row input[type=text] { flex: 1; padding: 10px 12px; font-size: 15px; border: 2px solid var(--blue); border-radius: 10px; }
  .nq-row button { padding: 10px 16px; border: none; border-radius: 10px; background: var(--red); color: #fff;
    font-weight: 900; letter-spacing: 1px; cursor: pointer; white-space: nowrap; }
  .nq-chips { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
  .nq-chip { display: inline-flex; align-items: center; gap: 6px; background: var(--blue); color: var(--cream);
    border-radius: 999px; padding: 5px 8px 5px 12px; font-size: 13px; font-weight: 700; }
  .nq-chip.manual { background: var(--red); }   /* your-own-questions categories */
  .nq-chip button { background: rgba(255,255,255,.3); border: none; color: #fff; border-radius: 50%; width: 18px;
    height: 18px; cursor: pointer; line-height: 1; padding: 0; }
  .nq-summary { font-size: 14px; color: var(--blue-dark); margin: 10px 0; font-weight: 700; }
  .nq-hint { font-size: 12px; color: #777; margin-top: 6px; }
  .nq-err { color: var(--red); font-weight: 800; margin: 8px 0; }
  .nq-key summary { cursor: pointer; font-size: 13px; color: var(--blue-dark); font-weight: 700; }
  .nq-key input { width: 100%; box-sizing: border-box; padding: 8px 10px; font-size: 13px;
    border: 2px solid rgba(29,58,138,.4); border-radius: 8px; margin-top: 6px; }

  /* ===== Phone PLAYER mode (?play=CODE) — a real responsive phone layout, NOT
     the scaled 1920×1080 TV stage. Neutralize the stage so it flows naturally. */
  body.player-mode #app { position: static; transform: none !important;
    width: 100%; height: auto; min-height: 100dvh; left: 0; top: 0; }
  body.player-mode header, body.player-mode footer, body.player-mode #meta { display: none; }
  body.player-mode #main { padding: 0; min-height: 100dvh; }
  .pl-wrap { min-height: 100dvh; box-sizing: border-box; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 22px; padding: 26px 22px; text-align: center; }
  .pl-logo { max-width: 60%; max-height: 120px; object-fit: contain; margin-bottom: 4px; }
  .pl-team { font-family: var(--label-font); font-size: 20px; letter-spacing: 2px;
    text-transform: uppercase; color: var(--yellow); }
  .pl-qnum { font-family: var(--label-font); font-size: 15px; letter-spacing: 3px;
    text-transform: uppercase; color: var(--cream); opacity: .65; }
  .pl-q { font-family: var(--q-font); font-size: clamp(22px, 6vw, 34px); line-height: 1.25;
    color: var(--cream); max-width: 600px; }
  .pl-prompt { font-family: var(--label-font); font-size: 16px; letter-spacing: 2px;
    text-transform: uppercase; color: var(--cream); opacity: .8; }
  .pl-input, .pl-name { width: 100%; max-width: 520px; box-sizing: border-box;
    padding: 16px 18px; font-size: 22px; border-radius: 14px; border: 3px solid var(--yellow);
    background: rgba(0,0,0,.28); color: var(--cream); text-align: center; font-family: var(--q-font); }
  .pl-input:focus, .pl-name:focus { outline: none; border-color: var(--red); }
  .pl-choices { display: flex; flex-direction: column; gap: 12px; width: 100%; max-width: 520px; }
  .pl-choice { padding: 16px 18px; font-size: 20px; border-radius: 14px; border: 3px solid rgba(255,255,255,.25);
    background: rgba(0,0,0,.28); color: var(--cream); font-family: var(--q-font); cursor: pointer; text-align: left; }
  .pl-choice.sel { border-color: var(--yellow); background: rgba(255,200,0,.18); }
  .pl-btn { font-family: var(--label-font); font-size: 22px; font-weight: 900; letter-spacing: 2px;
    color: #fff; background: var(--red); border: none; border-radius: 14px; padding: 16px 44px;
    cursor: pointer; box-shadow: 0 6px 0 var(--red-dark, rgba(0,0,0,.4)); }
  .pl-btn:active { transform: translateY(3px); box-shadow: 0 3px 0 var(--red-dark, rgba(0,0,0,.4)); }
  .pl-btn[disabled] { opacity: .5; cursor: default; box-shadow: none; }
  .pl-ok { font-family: var(--label-font); font-size: 28px; letter-spacing: 1px; color: var(--yellow); }
  .pl-wait { font-family: var(--q-font); font-size: 24px; color: var(--cream); opacity: .85; max-width: 520px; }
  .pl-sub { font-family: var(--q-font); font-size: 16px; color: var(--cream); opacity: .6; }
  .pl-locked { font-family: var(--q-font); font-size: 20px; color: var(--cream); opacity: .9; }
  .pl-locked b { color: var(--yellow); }

  /* Host-only live tracker: how many phones joined / answered this question. */
  #playerTracker { position: fixed; left: 16px; bottom: 16px; z-index: 60;
    background: rgba(0,0,0,.74); color: #fff; border: 2px solid var(--yellow);
    border-radius: 12px; padding: 9px 14px; font: 800 15px/1.25 system-ui, -apple-system, sans-serif;
    display: flex; flex-direction: column; gap: 2px; pointer-events: none;
    box-shadow: 0 6px 18px rgba(0,0,0,.45); }
  #playerTracker .pt-ans { color: var(--yellow); font-size: 13px; font-weight: 700; }
  body.display-mode #playerTracker, body.player-mode #playerTracker { display: none !important; }

  /* ===== Phone version (mode=phone): the TV/host question screen keeps the exact
     paper layout but drops the blue box + stripe texture and adds a "scan to play"
     join QR in the top-right corner. Scoped to .phone-version so the paper game is
     unchanged. ===== */
  body.phone-version::before { opacity: 0 !important; }            /* no diagonal stripe texture */
  /* The question box keeps its own fill (var(--qbox-bg), from the brand or the custom
     box color) + border + shadow — same as the paper version — so it's a distinct panel
     even when the page has no background image. (Set the box color in make.html.) */
  /* The topbar nudges the badge + category DOWN 70px to sit beside the logo. The phone
     version's always-on timer makes the topbar taller, so that nudge collides the
     category with the question box — drop the vertical nudge (keep the horizontal one). */
  body.phone-version .q-topbar--full .q-category { transform: translate(-120px, 0); }
  body.phone-version .q-topbar--full .q-badge { transform: none; }
  /* Match the QUESTION badge height to the category pill (same font → same height). */
  body.phone-version .q-badge { font-size: 48px; }
  /* QR sits in the natural bottom-right gap (below the question box, above the footer
     stripe, right of the howto) — no layout reservation, so nothing else moves. */
  #joinQr { position: absolute; bottom: 54px; right: 32px; z-index: 60; width: 204px;
    display: flex; flex-direction: column; align-items: center; gap: 3px; pointer-events: none; }
  /* TV footer is shorter but the box is taller, so the QR can ride lower there. */
  body.display-mode #joinQr { bottom: 34px; }
  #joinQr .joinqr-label { font-family: var(--label-font, "Anton","Oswald",Impact,sans-serif);
    font-size: 16px; letter-spacing: 1px; color: var(--cream); text-shadow: 2px 2px 0 #000; }
  #joinQr .joinqr-box { background: #fff; padding: 8px; border-radius: 12px; line-height: 0;
    box-shadow: 0 8px 26px rgba(0,0,0,.5); }
  #joinQr .joinqr-local { font: 600 12px/1.3 system-ui, sans-serif; color: #b00;
    max-width: 150px; text-align: center; padding: 10px; }

  /* Header (host AND TV) = a clean colored-stripe bar that mirrors the footer:
     no logo, no DON'T CHEAT, no round/question meta, no room tag — just the line. */
  .brand,
  .dont-cheat,
  #meta,
  #displayTag { display: none; }

  /* Location-name bar (host title screen only) */
  .loc-bar {
    position: absolute; top: 18px; left: 50%; transform: translateX(-50%);
    display: flex; align-items: center; gap: 12px; flex-wrap: wrap; justify-content: center;
    background: rgba(0,0,0,.28); border: 2px solid var(--yellow);
    padding: 12px 20px; border-radius: 16px; z-index: 6; max-width: 92vw;
  }
  .loc-label { color: var(--yellow); font-weight: 900; font-size: 18px; letter-spacing: 1.5px; }
  .loc-input {
    width: 320px; max-width: 60vw; font-size: 24px; font-weight: 800;
    padding: 10px 14px; border-radius: 12px; border: 2px solid var(--yellow);
    background: var(--cream); color: var(--blue-dark); text-align: center;
  }
  .loc-input:focus { outline: none; border-color: var(--red); box-shadow: 0 0 0 4px rgba(214,40,40,.25); }
  .loc-hint { color: var(--cream); font-size: 13px; opacity: .8; width: 100%; text-align: center; }

  /* Persistent instructions panel injected on TVs (lives outside #main so it
     survives re-renders). Reuses the .instructions look. */
  #tvInstructions { /* positioning inherited from .instructions */ }
  /* Title setup row (timer) */
  .setup-row { display: flex; gap: 12px; justify-content: center; align-items: center; margin-top: 16px; flex-wrap: wrap; }
  .setup-label { color: var(--cream); font-weight: 800; font-size: 18px; letter-spacing: 1px; }
  .timer-input {
    width: 92px; font-size: 22px; padding: 8px 10px; border-radius: 10px;
    border: 2px solid var(--yellow); background: var(--cream); color: var(--blue-dark);
    text-align: center; font-weight: 800;
  }
  .timer-input:focus { outline: none; border-color: var(--red); }

  /* Question countdown timer — on the host it sits in the top bar (above the
     SCOREBOARD pill); on the TVs it drops below the Top-3 banner (absolute). */
  .q-timer {
    background: var(--yellow); color: var(--blue-dark);
    border: 5px solid var(--black); border-radius: 16px;
    padding: 8px 36px; font-size: 64px; font-weight: 900; line-height: 1;
    min-width: 150px; text-align: center;
  }
  .q-timer.q-timer-up { background: var(--red); color: #fff; }
  /* Timer OFF: keep its exact footprint so toggling the timer never moves/resizes
     the question box — it just hides the number. */
  .q-timer.q-timer-off { visibility: hidden; }
  /* On the TV the timer stays in-flow in the top bar (same as the host), centered
     between the QUESTION badge and the category. */
  /* Host title-screen scoreboard box (replaces WIN PRIZES on the host; TVs keep WIN PRIZES) */
  .title-scoreboard {
    position: fixed;
    left: 36px;
    top: 50%;
    transform: translateY(-50%) rotate(-2deg);
    width: 380px;
    max-height: 72vh;
    overflow: hidden;
    background: #ffffff;
    color: var(--blue-dark);
    border: 6px solid var(--red);
    border-radius: 18px;
    box-shadow: 0 0 0 7px var(--blue), 0 20px 46px rgba(0,0,0,.55);
    padding: 0 0 14px;
    text-align: left;
    cursor: pointer;
    z-index: 5;
  }
  body.display-mode .title-scoreboard { display: none; }  /* host only */
  .title-scoreboard .ts-head {
    background: var(--red);
    color: var(--yellow);
    font-size: 34px;
    font-weight: 900;
    letter-spacing: 2px;
    padding: 14px 16px;
    text-align: center;
    text-shadow: 2px 2px 0 var(--black);
    border-bottom: 5px solid var(--black);
  }
  .title-scoreboard .ts-empty { font-size: 19px; text-align: center; line-height: 1.45; padding: 22px 22px 6px; }
  .title-scoreboard .ts-list { display: flex; flex-direction: column; padding: 14px 22px 0; max-height: 50vh; overflow: auto; }
  .title-scoreboard .ts-row { display: flex; align-items: center; gap: 8px; font-size: 24px; font-weight: 800; padding: 8px 0; border-bottom: 1px dashed rgba(29,58,138,.2); }
  .title-scoreboard .ts-row:last-child { border-bottom: 0; }
  .title-scoreboard .ts-rank { color: var(--red); min-width: 32px; }
  .title-scoreboard .ts-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .title-scoreboard .ts-score { color: var(--blue); font-weight: 900; }
  .title-scoreboard .ts-hint { margin-top: 12px; text-align: center; font-size: 13px; color: rgba(12,12,12,.5); padding: 0 16px; }

  /* Header right cluster + host scoreboard button */
  .header-right { display: flex; align-items: center; gap: 16px; position: relative; z-index: 2; }
  .host-badge {
    position: fixed;        /* floats in the top-right corner, below the stripe */
    top: 46px;
    right: 22px;
    z-index: 50;
    background: var(--yellow);
    color: var(--red);
    border: 3px solid var(--black);
    border-radius: 10px;
    padding: 6px 16px;
    font-size: 16px;
    font-weight: 900;
    letter-spacing: 1px;
    white-space: nowrap;
    text-shadow: 1px 1px 0 rgba(255,255,255,.4);
    box-shadow: 0 3px 10px rgba(0,0,0,.35);
  }
  body.display-mode .host-badge { display: none; }   /* host only — never on TVs */
  .scorebtn {
    padding: 10px 18px; border-radius: 10px; border: 3px solid var(--black);
    background: var(--yellow); color: var(--red); font-weight: 900;
    font-size: 18px; letter-spacing: 1px; cursor: pointer; white-space: nowrap;
    box-shadow: 0 4px 0 var(--blue-dark);
  }
  .scorebtn:hover { filter: brightness(1.05); }
  body.display-mode .scorebtn { display: none; }   /* TVs never show host controls */

  /* Scoreboard modal rows */
  .sb-status { margin: 6px 0 10px; font-size: 16px; }
  .sb-rows { display: flex; flex-direction: column; gap: 8px; max-height: 46vh; overflow: auto; }
  .sb-row { display: flex; gap: 8px; align-items: center; }
  .sb-name { flex: 1; padding: 10px 12px; border-radius: 8px; border: 2px solid #2a3a4d; background: #0e1826; color: #fff; font: inherit; font-size: 18px; }
  .sb-score { width: 90px; padding: 10px; border-radius: 8px; border: 2px solid var(--yellow); background: var(--cream); color: var(--blue-dark); text-align: center; font-weight: 800; font-size: 18px; }
  .sb-del { width: 40px; height: 40px; border: none; border-radius: 8px; background: var(--red); color: #fff; font-weight: 900; cursor: pointer; }
  .sb-empty { color: #9fb6c8; }

  /* Published leaderboard = a HORIZONTAL banner across the top (fills the empty
     space, sits above the question so it doesn't cover anything). */
  #lbOverlay { display: none; }
  #lbOverlay.show {
    display: block;
    position: fixed; top: 128px; left: 28px; right: 28px; z-index: 60;
  }
  #lbOverlay .lbo-card { display: flex; flex-direction: row; align-items: stretch; gap: 16px; }
  #lbOverlay .lbo-title {
    flex: 0 0 auto;
    display: flex; align-items: center; justify-content: center; text-align: center;
    background: var(--red); color: var(--yellow);
    border: 4px solid var(--black); border-radius: 16px;
    box-shadow: 0 12px 30px rgba(0,0,0,.5);
    padding: 0 26px; font-size: 36px; font-weight: 900; letter-spacing: 2px;
    text-shadow: 2px 2px 0 var(--black); line-height: 1.05; max-width: 320px;
  }
  #lbOverlay .lbo-list { flex: 1; display: flex; flex-direction: row; gap: 16px; }
  #lbOverlay .lbo-row {
    flex: 1; display: flex; align-items: center; gap: 14px;
    background: #ffffff; color: var(--blue-dark);
    border: 4px solid var(--blue); border-radius: 16px;
    box-shadow: 0 12px 30px rgba(0,0,0,.45);
    padding: 14px 24px; min-width: 0;
  }
  #lbOverlay .lbo-row.lbo-first { background: var(--yellow); border-color: var(--red); }
  #lbOverlay .lbo-rank { font-size: 52px; line-height: 1; }
  #lbOverlay .lbo-name { flex: 1; font-size: 42px; font-weight: 800; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  #lbOverlay .lbo-score { font-size: 54px; font-weight: 900; color: var(--blue); }
  #lbOverlay .lbo-empty { flex: 1; background: #fff; border: 4px solid var(--blue); border-radius: 16px; text-align: center; color: var(--blue-dark); font-size: 28px; padding: 18px; }
  /* Single answer-reveal screen (shown one at a time after each round) */
  .ans-q {
    font-family: var(--q-font, "Anton","Oswald",Impact,sans-serif);
    font-size: 56px;
    line-height: 1.18;
    color: var(--cream);
    background: var(--qbox-bg, linear-gradient(180deg, var(--blue-dark), #0a1234));
    border: 5px solid var(--qbox-border, var(--yellow));
    border-radius: 22px;
    padding: 26px 40px;
    letter-spacing: 1px;
    text-align: center;
  }
  .ans-q .q-num {
    display: inline-block;
    background: var(--yellow); color: var(--red);
    border: 3px solid var(--black); border-radius: 12px;
    padding: 2px 14px; margin-right: 14px; font-size: 44px; vertical-align: middle;
  }
  .ans-a {
    font-family: var(--q-font, "Anton","Oswald",Impact,sans-serif);
    margin-top: 24px;
    font-size: 72px;
    font-weight: 900;
    line-height: 1.1;
    color: var(--blue-dark);
    background: var(--yellow);
    border: 5px solid var(--black);
    border-radius: 18px;
    padding: 24px 40px;
    box-shadow: 0 14px 0 var(--red);
    text-align: center;
  }
  .ans-a .ans-label {
    display: block;
    font-size: 26px;
    letter-spacing: 5px;
    font-weight: 900;
    color: var(--red);
    margin-bottom: 10px;
  }

  /* End-of-game: full-screen Top 3 */
  .final-board {
    position: fixed; inset: 0; z-index: 70;
    width: auto; max-width: none;   /* override .view's 1500px cap so it fills the whole screen */
    background: transparent;   /* inherit the theme / per-screen background instead of a hardcoded blue */
    text-align: center; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 22px;
  }
  .final-board .fb-title { font-size: 80px; color: var(--yellow); margin: 0; letter-spacing: 4px; text-shadow: 4px 4px 0 var(--red), 8px 8px 0 var(--black); }
  .final-board .fb-list { width: min(1000px, 90vw); display: flex; flex-direction: column; gap: 16px; }
  .final-board .fb-row { display: flex; align-items: center; gap: 24px; background: var(--cream); color: var(--blue-dark); border: 5px solid var(--blue); border-radius: 18px; padding: 18px 34px; }
  .final-board .fb-row.fb-first { background: var(--yellow); border-color: var(--red); }
  .final-board .fb-rank { font-size: 56px; min-width: 72px; }
  .final-board .fb-name { flex: 1; font-size: 52px; font-weight: 800; text-align: left; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .final-board .fb-score { font-size: 58px; font-weight: 900; color: var(--blue); }
  .final-board .fb-empty { font-size: 34px; color: var(--cream); }

  /* End-of-game: winner reveal */
  .winner-screen {
    position: fixed; inset: 0; z-index: 70;
    width: auto; max-width: none;   /* override .view's 1500px cap so it fills the whole screen */
    background: transparent;   /* inherit the theme / per-screen background instead of a hardcoded blue */
    text-align: center; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 18px;
  }
  .winner-screen .win-burst { font-size: 90px; animation: turnin-pop .5s cubic-bezier(.2,.8,.3,1.2) both; }
  .winner-screen .win-label { font-size: 46px; color: var(--cream); letter-spacing: 6px; }
  .winner-screen .win-name {
    font-size: 120px; font-weight: 900; line-height: 1.04; color: var(--yellow);
    text-shadow: 5px 5px 0 var(--red), 10px 10px 0 var(--black);
    animation: turnin-pop .55s cubic-bezier(.2,.8,.3,1.2) both;
    max-width: 92vw;
  }
  .winner-screen .win-prize {
    font-size: 42px; font-weight: 900; color: var(--red);
    background: var(--yellow); border: 4px solid var(--black); border-radius: 16px;
    padding: 16px 30px; margin-top: 6px;
  }

  /* ----- GRAND CHAMPION celebration (final winner only) ----- */
  .winner-screen.champion .champ-crown { font-size: 100px; line-height: 1; animation: champ-bounce 1.4s ease-in-out infinite; }
  .winner-screen.champion .win-label { animation: champ-pop .5s cubic-bezier(.2,.9,.3,1.3) both; }
  .winner-screen.champion .win-name {
    font-size: 130px;
    animation: champ-pop .6s cubic-bezier(.2,.9,.3,1.4) both, champ-glow 1.8s ease-in-out .6s infinite;
  }
  .winner-screen.champion .win-prize { animation: champ-pop .5s ease-out .3s both; }
  /* keep all text/buttons above the falling confetti */
  .winner-screen.champion .champ-crown,
  .winner-screen.champion .win-label,
  .winner-screen.champion .win-name,
  .winner-screen.champion .win-prize,
  .winner-screen.champion .btn-row { position: relative; z-index: 1; }

  .confetti { position: absolute; inset: 0; overflow: hidden; pointer-events: none; z-index: 0; }
  .confetti-piece {
    position: absolute; top: -28px; border-radius: 2px;
    animation-name: confetti-fall; animation-timing-function: linear; animation-iteration-count: infinite;
  }
  @keyframes confetti-fall {
    0%   { transform: translateY(-14vh) translateX(0) rotate(0deg); }
    100% { transform: translateY(112vh) translateX(var(--drift, 0)) rotate(900deg); }
  }
  @keyframes champ-bounce {
    0%, 100% { transform: translateY(0) rotate(-6deg); }
    50%      { transform: translateY(-22px) rotate(6deg); }
  }
  @keyframes champ-pop {
    0%   { opacity: 0; transform: scale(.4) rotate(-6deg); }
    60%  { opacity: 1; transform: scale(1.12) rotate(2deg); }
    100% { opacity: 1; transform: scale(1) rotate(0); }
  }
  @keyframes champ-glow {
    0%, 100% { text-shadow: 5px 5px 0 var(--red), 10px 10px 0 var(--black); }
    50%      { text-shadow: 0 0 28px var(--yellow), 0 0 54px var(--yellow), 5px 5px 0 var(--red), 10px 10px 0 var(--black); }

// --- color helpers: derive darker/lighter shades from the chosen colors ---
function _hexToRgb(c) { c = String(c || "").replace("#", ""); if (c.length === 3) c = c.split("").map(x => x + x).join(""); const n = parseInt(c, 16) || 0; return [(n >> 16) & 255, (n >> 8) & 255, n & 255]; }
function _rgbToHex(a) { return "#" + a.map(x => Math.max(0, Math.min(255, Math.round(x))).toString(16).padStart(2, "0")).join(""); }
function _darken(hex, amt) { return _rgbToHex(_hexToRgb(hex).map(x => x * (1 - amt))); }
function _lighten(hex, amt) { return _rgbToHex(_hexToRgb(hex).map(x => x + (255 - x) * amt)); }

// Push the theme into the CSS custom properties the whole UI is built on.
function applyTheme(t) {
  const s = document.documentElement.style;
  s.setProperty("--red", t.primary);
  s.setProperty("--red-dark", _darken(t.primary, .18));
  s.setProperty("--red-deep", _darken(t.primary, .42));
  s.setProperty("--yellow", t.accent);
  s.setProperty("--yellow-bright", _lighten(t.accent, .14));
  s.setProperty("--blue", t.deep);
  s.setProperty("--blue-dark", _darken(t.deep, .34));
  s.setProperty("--blue-bright", _lighten(t.deep, .18));
  s.setProperty("--cream", t.light);
  s.setProperty("--ink", t.light);
  s.setProperty("--ink-dim", _darken(t.light, .18));
  s.setProperty("--bg-mid", _darken(t.deep, .58));
  s.setProperty("--bg-bot", _darken(t.deep, .74));
  s.setProperty("--title-font", t.font || '"Anton","Oswald",Impact,sans-serif');
  s.setProperty("--q-font", t.qfont || '"Anton","Oswald",Impact,sans-serif');
  s.setProperty("--label-font", t.labelfont || '"Anton","Oswald",Impact,sans-serif');
  s.setProperty("--qbox-w", (t.boxW || 100) + "%");
  // Question-box fill + border (empty = derive from the background / accent).
  s.setProperty("--qbox-bg", t.boxBg
    ? "linear-gradient(180deg, " + t.boxBg + ", " + _darken(t.boxBg, .32) + ")"
    : "linear-gradient(180deg, " + _darken(t.deep, .34) + ", " + _darken(t.deep, .62) + ")");
  s.setProperty("--qbox-border", t.boxBorder || t.accent);
  // Background style — built by the shared bgBackground() so the game and the
  // make.html preview always match.
  const b = document.body;
  if (b) {
    const style = t.bg || "gradient";
    const dimv = Math.max(0, Math.min(0.9, (t.dim || 0) / 100));
    const dimLayer = dimv > 0 ? "linear-gradient(rgba(0,0,0," + dimv + "),rgba(0,0,0," + dimv + ")), " : "";
    b.style.background = dimLayer + bgBackground(style, t);
    b.classList.toggle("bg-plain", !(style === "gradient" || style === "stripes"));
    b.classList.toggle("phone-version", t.mode === "phone");   // phone game: clean question + join QR
  }
  ensureDesignFonts();
}
// Load any non-system font the design references: Google Fonts by family name, and
// uploaded fonts embedded in the design (THEME.fontFaces). So imported fonts render.
function ensureDesignFonts() {
  try {
    const fams = new Set();
    const add = v => { if (!v) return; const m = String(v).match(/['"]([^'"]+)['"]/); const fam = m ? m[1] : String(v).split(",")[0].trim(); if (fam) fams.add(fam); };
    add(THEME.font); add(THEME.qfont); add(THEME.labelfont);
    if (THEME.screens) Object.keys(THEME.screens).forEach(k => { const s = THEME.screens[k]; if (s) { add(s.font); add(s.qfont); add(s.labelfont); } });
    if (DESIGN && Array.isArray(DESIGN.els)) DESIGN.els.forEach(e => add(e.font));
    (THEME.fontFaces || []).forEach(ff => { if (ff && ff.family && ff.src) { const id = "ff-" + ff.family.replace(/[^a-z0-9]+/gi, "-"); if (!document.getElementById(id)) { const st = document.createElement("style"); st.id = id; st.textContent = "@font-face{font-family:'" + ff.family.replace(/'/g, "") + "';src:url('" + ff.src + "');font-display:swap}"; document.head.appendChild(st); } fams.delete(ff.family); } });
    const skip = new Set(["serif", "sans-serif", "monospace", "cursive", "Impact", "Arial", "Georgia", "ui-monospace", "system-ui", "Helvetica", "Times"]);
    const families = [...fams].filter(f => f && !skip.has(f));
    if (!families.length) return;
    const href = "https://fonts.googleapis.com/css2?" + families.map(f => "family=" + encodeURIComponent(f).replace(/%20/g, "+") + ":wght@400;600;700;900").join("&") + "&display=swap";
    let l = document.getElementById("gf-design");
    if (!l) { l = document.createElement("link"); l.id = "gf-design"; l.rel = "stylesheet"; document.head.appendChild(l); }
    if (l.getAttribute("href") !== href) l.setAttribute("href", href);
  } catch (e) {}
}
// Returns the CSS `background` value for a given style using the theme colors.

    case "duotone": return "linear-gradient(135deg, " + _darken(D, .2) + " 0%, " + _darken(P, .12) + " 100%)";
    case "spotlight": return "radial-gradient(1100px 720px at 50% -8%, " + bright + " 0%, " + mid + " 42%, " + bot + " 100%)";
    case "stripes": return "repeating-linear-gradient(45deg, rgba(255,255,255,.05) 0 16px, transparent 16px 34px), radial-gradient(1400px 900px at 50% -15%, " + dark + " 0%, " + mid + " 60%, " + bot + " 100%)";
    case "dots": return "radial-gradient(" + _lighten(D, .13) + " 2px, transparent 2.6px) 0 0 / 30px 30px, " + bot;
    case "grid": return "linear-gradient(" + _lighten(D, .12) + " 1px, transparent 1px) 0 0/46px 46px, linear-gradient(90deg, " + _lighten(D, .12) + " 1px, transparent 1px) 0 0/46px 46px, " + bot;
    case "geometric": return "repeating-linear-gradient(135deg, " + _darken(D, .35) + " 0 46px, " + mid + " 46px 92px)";
    case "galaxy": return "radial-gradient(1.5px 1.5px at 12% 22%,#fff,transparent),radial-gradient(1px 1px at 32% 64%,#fff,transparent),radial-gradient(1.5px 1.5px at 54% 18%,#fff,transparent),radial-gradient(1px 1px at 72% 50%,#fff,transparent),radial-gradient(1.5px 1.5px at 86% 78%,#fff,transparent),radial-gradient(1px 1px at 44% 88%,#fff,transparent),radial-gradient(1px 1px at 92% 34%,#fff,transparent),radial-gradient(760px 480px at 72% 22%," + P + "44,transparent 70%),radial-gradient(820px 540px at 22% 74%," + A + "33,transparent 70%)," + _darken(D, .82);
    case "watercolor": return "radial-gradient(540px 440px at 24% 30%," + P + "55,transparent 62%),radial-gradient(540px 450px at 76% 66%," + A + "55,transparent 62%),radial-gradient(500px 410px at 60% 20%," + D + "55,transparent 62%)," + _lighten(D, .42);
    case "vintage": return "radial-gradient(1200px 820px at 50% 38%, " + _darken(A, .42) + " 0%, " + _darken(D, .5) + " 60%, " + bot + " 100%)";
    case "neon": return "radial-gradient(42% 50% at 32% 44%, " + P + "66, transparent 70%)," +
      "radial-gradient(46% 56% at 67% 56%, " + A + "59, transparent 72%)," +
      "radial-gradient(34% 34% at 50% 50%, " + A + "22, transparent 70%)," +
      "repeating-linear-gradient(0deg, rgba(255,255,255,.035) 0 1px, transparent 1px 40px)," +

    case "rays": return `repeating-conic-gradient(from 0deg at 50% 0%, ${A}22 0 6deg, transparent 6deg 13deg), radial-gradient(1200px 820px at 50% -8%, ${_lighten(D,.16)} 0%, ${_darken(D,.62)} 60%, ${_darken(D,.82)} 100%)`;
    case "bokeh": return `radial-gradient(circle at 18% 28%, ${P}40, transparent 9%), radial-gradient(circle at 76% 22%, ${A}38, transparent 7%), radial-gradient(circle at 62% 68%, ${P}33, transparent 11%), radial-gradient(circle at 30% 78%, ${A}30, transparent 8%), ${_darken(D,.72)}`;
    case "aurora": return `linear-gradient(115deg, ${_darken(D,.52)} 0%, ${_darken(P,.16)} 34%, ${_darken(A,.2)} 64%, ${_darken(D,.58)} 100%)`;
    case "plaid": return `repeating-linear-gradient(0deg, ${P}1f 0 6px, transparent 6px 48px), repeating-linear-gradient(90deg, ${P}1f 0 6px, transparent 6px 48px), repeating-linear-gradient(0deg, ${A}17 0 2px, transparent 2px 48px), ${_darken(D,.64)}`;

// Per-screen look — a design (made in make.html) can give the title, question, and
// answer screens DIFFERENT backgrounds + fonts. This applies the right one for the
// current screen, falling back to the global theme when a screen has no override.
function applyScreenStyle(key) {
  const sc = (THEME.screens && THEME.screens[key]) || null;
  const pick = (a, b) => (a != null && a !== "") ? a : b;
  const font  = sc ? pick(sc.font, THEME.font)           : THEME.font;
  const qfont = sc ? pick(sc.qfont, THEME.qfont)         : THEME.qfont;
  const lfont = sc ? pick(sc.labelfont, THEME.labelfont) : THEME.labelfont;
  const s = document.documentElement.style;
  s.setProperty("--title-font", font  || '"Anton","Oswald",Impact,sans-serif');
  s.setProperty("--q-font",     qfont || '"Anton","Oswald",Impact,sans-serif');
  s.setProperty("--label-font", lfont || '"Anton","Oswald",Impact,sans-serif');
  const style = (sc && sc.bg) || THEME.bg || "gradient";
  const dim = (sc && sc.dim != null) ? sc.dim : (THEME.dim || 0);
  const b = document.body; if (!b) return;
  const dimv = Math.max(0, Math.min(0.9, (dim || 0) / 100));
  const dimLayer = dimv > 0 ? "linear-gradient(rgba(0,0,0," + dimv + "),rgba(0,0,0," + dimv + ")), " : "";
  const t2 = Object.assign({}, THEME, { bgimg: (sc && sc.bgimg) || THEME.bgimg, fit: (sc && sc.fit) || THEME.fit });
  b.style.background = dimLayer + bgBackground(style, t2);
  b.classList.toggle("bg-plain", !(style === "gradient" || style === "stripes"));

// A "version" link can carry its whole brand in the URL (made by make.html):
//   ?title1=BAR&title2=QUIZ&primary=6b21a8&accent=ff8a00&deep=241036&light=fff7ed&logo=https://…
// When present, those override the saved theme so the link reproduces the brand
// on any device. (No params = the default theme — nothing changes.)
(function applyUrlTheme() {
  try {
    const p = new URLSearchParams(location.search);
    const COLORS = ["primary", "accent", "deep", "light"];
    let touched = false;
    // p.get() already URL-decodes, so no extra decodeURIComponent (keeps data-URL logos intact).
    ["title1", "title2", "logo", "bg", "bgimg", "font", "qfont", "labelfont", "boxBg", "boxBorder", "boxW", "dim", ...COLORS].forEach(k => {
      let v = p.get(k);
      if (v == null || v === "") return;
      if (COLORS.includes(k) && v[0] !== "#") v = "#" + v;
      THEME[k] = v;
      touched = true;
    });
    if (touched) applyTheme(THEME);
  } catch (e) {}
})();

// Where the brand logo image comes from (custom data URL, built-in, or none).
function brandLogoSrc() {
  if (THEME.logo === "none") return "";
  if (THEME.logo) return THEME.logo;

}

// ---- Freeform design overlay ----
// A "design" (made in make.html) is custom text boxes + images placed anywhere on
// each screen. It's loaded by ?design=<id> from localStorage (same browser) and
// rendered on top of the normal screen. Positions are % of the 1920×1080 stage,
// text size is in stage px, so it scales with everything else. (DESIGN declared above.)
async function loadDesign(idArg) {
  let id = idArg;
  if (!id) { try { id = new URLSearchParams(location.search).get("design"); } catch (e) {} }
  if (!id || id === LIVE_DESIGN_ID) return;
  LIVE_DESIGN_ID = id;
  let d = null;
  // 1) Cloud first — so custom logos/images travel to any device (links stay short).
  try {
    if (liveConfigured()) {
      const { data } = await liveClient().from(LIVE_TABLE).select("state").eq("room_code", "dsgn_" + id).maybeSingle();
      if (data && data.state) { const p = JSON.parse(data.state); d = p.design || p; }
    }
  } catch (e) {}
  // 2) Fall back to this browser's saved copy.
  if (!d) { try { const raw = localStorage.getItem("trivia-design-" + id); if (raw) d = JSON.parse(raw); } catch (e) {} }
  if (!d) return;
  DESIGN = d;
  if (d.theme) { THEME = Object.assign({}, THEME, d.theme); applyTheme(THEME); }
  ensureDesignFonts();   // load imported/element fonts even if the design carries no theme
  render();   // re-render now that the design (theme + elements) is loaded
}
// A baked-in (downloaded) version applies its design synchronously at boot — no id,
// no Supabase fetch. TVs/players opened from the same file already have it too, so
// their loadDesign("baked") is skipped (LIVE_DESIGN_ID already "baked").
function applyBakedDesign(d) {
  if (!d) return;
  DESIGN = d;
  LIVE_DESIGN_ID = "baked";
  if (d.theme) { THEME = Object.assign({}, THEME, d.theme); applyTheme(THEME); }
  if (Array.isArray(d.rounds) && d.rounds.length) { ROUNDS = d.rounds; try { saveRounds(); } catch (e) {} buildSchedule(); }
  ensureDesignFonts();
}
function designScreenKey() {

function renderDesignOverlay() {

const State = {
  TITLE: "title",
  ROUND_INTRO: "round_intro",
  QUESTION: "question",
  TURN_IN: "turn_in",     // "TURN IN YOUR ANSWER SHEET!" after a round's last question
  ANSWER: "answer",       // one question + its answer, revealed one screen at a time
  FINAL_BOARD: "final_board", // full-screen Top 3 at the very end
  WINNER: "winner",       // winning team + "collect your prize"
  ROUND_END: "round_end", // (legacy full answer list — no longer scheduled)
  END: "end"

const game = {

  roundIdx: 0,
  questionIdx: 0,

// The whole game is a flat, ordered list of screens, computed from ROUNDS.
// Each round: intro → its questions → TURN IN → that round's answers shown

let SCHEDULE = [];
function buildSchedule() {
  const s = [{ state: State.TITLE }];
  const N = ROUNDS.length;
  for (let r = 0; r < N; r++) {
    const len = ROUNDS[r].questions.length;
    s.push({ state: State.ROUND_INTRO, roundIdx: r });
    for (let qi = 0; qi < len; qi++) {
      s.push({ state: State.QUESTION, roundIdx: r, questionIdx: qi });
    }
    s.push({ state: State.TURN_IN, roundIdx: r });
    for (let qi = 0; qi < len; qi++) {   // reveal each answer of this round, one screen each
      s.push({ state: State.ANSWER, roundIdx: r, questionIdx: qi });
    }
    if (r < N - 1) {
      // After each round (except the last): standings + the leader so far.
      s.push({ state: State.FINAL_BOARD, roundIdx: r, final: false });
      s.push({ state: State.WINNER, roundIdx: r, final: false });
    } else {
      // After the final round: all-time Top 3 + the overall champion.
      s.push({ state: State.FINAL_BOARD, final: true });
      s.push({ state: State.WINNER, final: true });
    }
  }
  s.push({ state: State.END });
  SCHEDULE = s;
}
function applyFrame(f) {
  if (!f) return;
  game.state       = f.state;
  game.roundIdx    = f.roundIdx    || 0;
  game.questionIdx = f.questionIdx || 0;
  game.answersIdx  = (f.answersIdx != null) ? f.answersIdx : 0;
  game.isFinal     = !!f.final;
}
// ---- Phone version self-run: no host clicks NEXT. Each question advances when
// every joined player has answered OR after 3 minutes; other screens auto-advance
// on a short delay. Only the host drives it (TVs + phones follow the sync).
const AUTO_QSECS = 180;        // 3 minutes per question (default; host's timer overrides)
let AUTO_DEADLINE = 0;         // epoch ms the current screen auto-advances at (0 = manual)
function phoneHostAuto() { return THEME.mode === "phone" && live.role === "host"; }
function autoScreenSecs(state) {
  switch (state) {
    case State.ROUND_INTRO: return 8;
    case State.TURN_IN: return 6;
    case State.ANSWER: return 9;
    case State.FINAL_BOARD: return 14;
    case State.WINNER: return 14;
    default: return 8;
  }
}
function gotoCursor(n) {
  game.cursor = Math.max(0, Math.min(n, SCHEDULE.length - 1));
  applyFrame(SCHEDULE[game.cursor]);
  const auto = phoneHostAuto();
  if (game.state === State.QUESTION) {
    // Per-question countdown: host's timer if set, else the phone-version 3-min default.
    const secs = TIMER_SECS > 0 ? TIMER_SECS : (auto ? AUTO_QSECS : 0);
    TIMER_END = secs > 0 ? Date.now() + secs * 1000 : 0;
    AUTO_DEADLINE = auto ? Date.now() + (TIMER_SECS > 0 ? TIMER_SECS : AUTO_QSECS) * 1000 : 0;
  } else {
    TIMER_END = 0;
    // Phone version self-runs the in-between screens too; title/end wait for a person.
    AUTO_DEADLINE = (auto && game.state !== State.TITLE && game.state !== State.END)
      ? Date.now() + autoScreenSecs(game.state) * 1000 : 0;
  }
  render();
}

const main = document.getElementById("main");
const meta = document.getElementById("meta");

function totalQuestions() {
  return ROUNDS.reduce((sum, r) => sum + r.questions.length, 0);
}
function questionGlobalIndex() {
  let n = 0;
  for (let i = 0; i < game.roundIdx; i++) n += ROUNDS[i].questions.length;
  return n + game.questionIdx + 1;
}

function renderMeta() {
  if (game.state === State.TITLE || game.state === State.END ||
      game.state === State.FINAL_BOARD || game.state === State.WINNER) {
    meta.innerHTML = "";
    return;
  }
  const round = ROUNDS[game.roundIdx];
  const qChip = (game.state === State.QUESTION)
    ? `<div class="chip">QUESTION <b>${game.questionIdx + 1}</b> / ${round.questions.length}</div>`
    : "";
  meta.innerHTML = `
    <div class="chip">ROUND <b>${game.roundIdx + 1}</b> / ${ROUNDS.length}</div>
    ${qChip}
  `;
}

// Build a burst of falling confetti pieces for the champion screen.
function spawnConfetti() {
  const box = document.getElementById("confetti");
  if (!box) return;
  const colors = ["#fd1d1e", "#f4c430", "#1d3a8a", "#ffd84d", "#f7f1e3", "#2a52be"];
  let html = "";
  for (let i = 0; i < 70; i++) {
    const left = Math.floor(Math.random() * 100);
    const delay = (Math.random() * 3.5).toFixed(2);
    const dur = (2.6 + Math.random() * 2.6).toFixed(2);
    const drift = Math.floor(Math.random() * 60 - 30);
    const wpx = 8 + Math.floor(Math.random() * 9);
    const color = colors[Math.floor(Math.random() * colors.length)];
    html += '<i class="confetti-piece" style="left:' + left + '%;background:' + color +
            ';width:' + wpx + 'px;height:' + Math.round(wpx * 1.6) + 'px;animation-delay:' + delay +
            's;animation-duration:' + dur + 's;--drift:' + drift + 'px;"></i>';
  }
  box.innerHTML = html;
}

// Scale the answer list so every question+answer fits on one screen with
// no scrolling and as little empty space as possible.
function fitAnswers() {
  const box = main.querySelector(".qa-list");
  if (!box) return;
  const ol = box.querySelector("ol");
  if (!ol) return;

  const fits = () =>
    ol.scrollHeight <= box.clientHeight && ol.scrollWidth <= box.clientWidth;

  const MIN = 14, MAX = 64;
  // Binary search for the largest base font-size that still fits.
  let lo = MIN, hi = MAX, best = MIN;
  for (let i = 0; i < 18; i++) {
    const mid = (lo + hi) / 2;
    box.style.fontSize = mid + "px";
    if (fits()) { best = mid; lo = mid; }
    else { hi = mid; }
  }
  box.style.fontSize = best + "px";
}

// Scale the question text so it fills the big question box (large font for short
// questions, smaller for long ones) — keeps the box from looking empty.
function fitQuestion() {
  const box = main.querySelector(".q-text");
  if (!box) return;
  const body = box.querySelector(".q-text-body");
  if (!body) return;
  const cs = getComputedStyle(box);
  const padX = parseFloat(cs.paddingLeft) + parseFloat(cs.paddingRight);
  const padY = parseFloat(cs.paddingTop) + parseFloat(cs.paddingBottom);
  const fits = () =>
    body.scrollWidth <= (box.clientWidth - padX) + 1 &&
    body.scrollHeight <= (box.clientHeight - padY) + 1;

  const MIN = 10, MAX = 240;   // low floor so the text always shrinks to fit the box (matches the builder)
  let lo = MIN, hi = MAX, best = MIN;
  for (let i = 0; i < 22; i++) {
    const mid = (lo + hi) / 2;
    box.style.fontSize = mid + "px";
    if (fits()) { best = mid; lo = mid; } else { hi = mid; }
  }
  box.style.fontSize = best + "px";
}
